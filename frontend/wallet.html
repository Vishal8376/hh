<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credential Wallet — TrustVault</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/wallet.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="particles"></div>
  <nav class="nav"><a href="index.html" class="nav__brand"><i data-lucide="shield-check"></i> TrustVault</a><button class="nav__toggle" aria-label="Menu"><i data-lucide="menu"></i></button><ul class="nav__links"><li><a href="index.html" class="nav__link">Home</a></li><li><a href="verify.html" class="nav__link">Verify</a></li><li><a href="wallet.html" class="nav__link active">Wallet</a></li><li><a href="consent.html" class="nav__link">Consent</a></li><li><a href="anomaly.html" class="nav__link">Anomaly</a></li></ul></nav>

  <main class="page container">
    <div class="wallet-header anim-fade-in-up">
      <div class="wallet-user">
        <div class="wallet-avatar">AM</div>
        <div>
          <h1 style="font-size:1.5rem;font-weight:700;">My Credential Wallet</h1>
          <p style="color:var(--text-secondary);font-size:.875rem;"><span id="cred-count">0</span> verified credentials · DigiLocker-aligned</p>
        </div>
      </div>
      <a href="verify.html" class="btn btn--primary"><i data-lucide="plus"></i> Add Credential</a>
    </div>

    <div id="cred-grid" class="grid grid--3 anim-fade-in-up"></div>
  </main>

  <!-- Credential Detail Modal -->
  <div class="modal-overlay" id="cred-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Credential Details</h2>
        <button class="modal__close" onclick="closeModal('cred-modal')"><i data-lucide="x"></i></button>
      </div>
      <div id="cred-modal-body"></div>
    </div>
  </div>

  <div class="a11y-toolbar"></div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/wallet.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
